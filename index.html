<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple PDF Maker | Professional Tools</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --accent: #ffffff;
            --text-muted: #666666;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #fff;
            margin: 0;
            padding: 0;
            overflow-y: auto;
        }

        header { padding: 60px 20px 30px; text-align: center; }
        header h1 { font-weight: 400; font-size: 2.5rem; letter-spacing: -0.04em; margin: 0; }
        .sub-text { color: var(--text-muted); font-size: 0.75rem; margin-top: 10px; letter-spacing: 0.3em; text-transform: uppercase; }

        .container {
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 20px 100px; 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 30px;
        }

        @media (min-width: 1024px) { .container { grid-template-columns: 300px 1fr; } }

        .sidebar {
            background: var(--surface); 
            border: 1px solid var(--border);
            border-radius: 20px; 
            padding: 30px; 
            height: fit-content;
        }

        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 20px; display: block; }

        .btn {
            width: 100%; padding: 16px; border-radius: 12px; font-size: 0.9rem; font-weight: 500;
            cursor: pointer; transition: 0.2s; border: none; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-main { background: var(--accent); color: #000; }
        .btn-main:disabled { background: #222; color: #555; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #fff; }

        .btn-clear {
            background: none; border: none; color: var(--text-muted);
            font-size: 0.7rem; margin-top: 20px; width: 100%; cursor: pointer;
        }
        .btn-clear:hover { color: #ff4444; }

        .main-content { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; min-height: 400px; }
        #image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }

        .image-card {
            aspect-ratio: 1; background: #000; border-radius: 10px;
            overflow: hidden; border: 1px solid var(--border);
            position: relative; cursor: grab;
        }

        .image-card img { width: 100%; height: 100%; object-fit: cover; }
        .badge {
            position: absolute; top: 5px; left: 5px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
        }

        .empty-state { grid-column: 1 / -1; text-align: center; padding: 100px 0; color: var(--text-muted); font-weight: 300; }
    </style>
</head>
<body>

<header>
    <h1>page forge</h1>
    <div class="sub-text">Image to PDF Studio</div>
</header>

<div class="container">
    <aside class="sidebar">
        <span class="label">Controls</span>
        
        <label for="file-input" class="btn btn-main" id="upload-label">
            Add Images
            <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleUpload(this.files)">
        </label>
        
        <button class="btn btn-outline" id="download-btn" onclick="generatePDF()" disabled>
            Download PDF
        </button>

        <button class="btn-clear" onclick="resetWorkspace()">Clear All Assets</button>
        <p id="limit-note" style="font-size: 10px; color: #444; text-align: center; margin-top: 15px;">Max: 20 images</p>
    </aside>

    <main class="main-content">
        <div id="image-grid">
            <div class="empty-state">No images uploaded yet.</div>
        </div>
    </main>
</div>

<script>
    let imagesArray = [];
    const grid = document.getElementById('image-grid');
    const downloadBtn = document.getElementById('download-btn');

    // Initialize Sortable
    new Sortable(grid, {
        animation: 250,
        onEnd: () => refreshDataOrder()
    });

    async function handleUpload(files) {
        if (imagesArray.length + files.length > 20) {
            alert("Maximum limit of 20 images reached.");
            return;
        }

        const emptyMsg = document.querySelector('.empty-state');
        if (emptyMsg) emptyMsg.remove();

        for (let file of files) {
            if (imagesArray.length >= 20) break;
            
            const base64 = await convertToBase64(file);
            imagesArray.push(base64);
            
            const card = document.createElement('div');
            card.className = 'image-card';
            card.innerHTML = `<div class="badge">${imagesArray.length}</div><img src="${base64}">`;
            grid.appendChild(card);
        }
        updateUI();
    }

    function convertToBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }

    function refreshDataOrder() {
        const renderedImages = document.querySelectorAll('.image-card img');
        const badges = document.querySelectorAll('.badge');
        imagesArray = [];
        renderedImages.forEach((img, index) => {
            imagesArray.push(img.src);
            badges[index].innerText = index + 1;
        });
    }

    function updateUI() {
        downloadBtn.disabled = imagesArray.length === 0;
        downloadBtn.innerText = imagesArray.length > 0 ? `Download PDF (${imagesArray.length})` : "Download PDF";
        
        // Hide upload button if at limit
        document.getElementById('upload-label').style.display = imagesArray.length >= 20 ? 'none' : 'flex';
    }

    function resetWorkspace() {
        imagesArray = [];
        grid.innerHTML = '<div class="empty-state">No images uploaded yet.</div>';
        updateUI();
        document.getElementById('file-input').value = ""; // Clear file input
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();

        downloadBtn.innerText = "Processing...";
        downloadBtn.disabled = true;

        try {
            for (let i = 0; i < imagesArray.length; i++) {
                if (i > 0) doc.addPage();
                
                // Add image with 40pt margin, auto-scaling to fit page
                doc.addImage(
                    imagesArray[i], 
                    'JPEG', 
                    40, 
                    40, 
                    pageWidth - 80, 
                    pageHeight - 80, 
                    undefined, 
                    'FAST'
                );
            }
            doc.save("document_export.pdf");
        } catch (error) {
            console.error("PDF Generation Error:", error);
            alert("Error generating PDF. Please try smaller files.");
        } finally {
            updateUI();
        }
    }
</script>

</body>
</html>
