<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page Forge | Aethercore Interactive</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --accent: #ffffff;
            --muted: #444;
            --danger: #ff3333;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; }

        header { padding: 100px 20px 60px; text-align: center; }
        header h1 { font-weight: 900; font-size: 3.5rem; letter-spacing: -0.08em; margin: 0; text-transform: uppercase; }
        .branding-sub { color: var(--muted); font-weight: 300; font-size: 0.8rem; margin-top: 5px; letter-spacing: 0.6em; text-transform: uppercase; }

        .workspace { max-width: 1200px; margin: 0 auto; padding: 0 20px 100px; display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 1024px) { .workspace { grid-template-columns: 350px 1fr; } }

        /* THE NEW LOOK: INDUSTRIAL BOLD */
        .control-panel { background: var(--surface); border: 2px solid #222; padding: 40px; height: fit-content; }
        .label { font-weight: 900; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 40px; display: block; border-left: 3px solid var(--accent); padding-left: 15px; }

        .btn {
            width: 100%; padding: 22px; font-weight: 900; font-size: 0.9rem;
            cursor: pointer; border: none; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; letter-spacing: 0.2em;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #ccc; }
        .btn-primary:active { transform: translateY(2px); }
        .btn-primary:disabled { background: #1a1a1a; color: #333; cursor: not-allowed; }

        .btn-secondary { background: transparent; border: 2px solid #222; color: #fff; }
        .btn-secondary:hover { border-color: #fff; }

        .btn-reset {
            background: none; border: none; color: #555; font-size: 0.7rem; 
            font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; 
            margin-top: 50px; width: 100%; cursor: pointer;
        }
        .btn-reset:hover { color: var(--danger); }

        /* GALLERY AREA */
        .gallery { background: var(--surface); border: 2px solid #222; padding: 40px; min-height: 500px; }
        #sortable-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }

        .item { aspect-ratio: 1; background: #000; overflow: hidden; border: 1px solid #222; position: relative; }
        .item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .sort-number {
            position: absolute; bottom: 0; right: 0; background: var(--accent); 
            color: #000; font-weight: 900; font-size: 0.8rem; 
            padding: 5px 12px; z-index: 2;
        }

        input[type="file"] { display: none; }
        #empty-state { grid-column: 1/-1; text-align: center; padding: 150px 0; color: #222; font-weight: 900; font-size: 2rem; letter-spacing: -0.05em; }
    </style>
</head>
<body>

<header>
    <h1>PAGE FORGE</h1>
    <div class="branding-sub">Aethercore Interactive</div>
</header>

<div class="workspace">
    <aside class="control-panel">
        <span class="label">CORE INTERFACE</span>
        
        <label for="uploader" class="btn btn-primary" id="upload-label">
            ADD ASSETS
            <input type="file" id="uploader" multiple accept="image/*">
        </label>
        
        <button class="btn btn-secondary" id="save-btn" disabled>GENERATE PDF</button>
        <button class="btn-reset" id="reset-btn">PURGE WORKSPACE</button>
        
        <div id="status-text" style="font-size: 0.6rem; margin-top: 30px; color: #444; letter-spacing: 0.1em; text-align: center;">LIMIT: 20 SLOTS</div>
    </aside>

    <main class="gallery">
        <div id="sortable-grid">
            <div id="empty-state">EMPTY ARCHIVE</div>
        </div>
    </main>
</div>

<script>
    // CORE APP STATE
    const state = {
        photos: [],
        max: 20
    };

    // DOM REFERENCES
    const grid = document.getElementById('sortable-grid');
    const uploader = document.getElementById('uploader');
    const saveBtn = document.getElementById('save-btn');
    const resetBtn = document.getElementById('reset-btn');
    const statusText = document.getElementById('status-text');

    // INITIALIZE SORTING
    new Sortable(grid, {
        animation: 150,
        ghostClass: 'sortable-ghost',
        onEnd: syncStateFromDOM
    });

    // 1. ASSET UPLOAD
    uploader.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        const empty = document.getElementById('empty-state');
        if (empty && files.length > 0) empty.remove();

        for (let file of files) {
            if (state.photos.length >= state.max) break;
            
            const base64 = await new Promise(r => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => r(reader.result);
            });

            state.photos.push(base64);
            renderCard(base64, state.photos.length);
        }
        updateUI();
        uploader.value = ''; // Reset input
    });

    // 2. GENERATE PDF (CORE ENGINE)
    saveBtn.addEventListener('click', () => {
        if (state.photos.length === 0) return;
        
        saveBtn.innerText = "FORGING...";
        saveBtn.disabled = true;

        // Use requestAnimationFrame to ensure UI updates before heavy task
        requestAnimationFrame(() => {
            setTimeout(() => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({ orientation: 'p', unit: 'pt', format: 'a4', compress: true });
                    const pw = doc.internal.pageSize.getWidth();
                    const ph = doc.internal.pageSize.getHeight();

                    state.photos.forEach((data, i) => {
                        if (i > 0) doc.addPage();
                        // Full bleed with 40pt margin
                        doc.addImage(data, 'JPEG', 40, 40, pw - 80, ph - 80, undefined, 'MEDIUM');
                    });

                    doc.save(`FORGE_${Date.now()}.pdf`);
                } catch (err) {
                    alert("FATAL: Memory limit exceeded. Use smaller files.");
                } finally {
                    saveBtn.innerText = "GENERATE PDF";
                    updateUI();
                }
            }, 50);
        });
    });

    // 3. PURGE WORKSPACE
    resetBtn.addEventListener('click', () => {
        state.photos = [];
        grid.innerHTML = '<div id="empty-state">EMPTY ARCHIVE</div>';
        updateUI();
    });

    // HELPERS
    function renderCard(src, index) {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<div class="sort-number">${index}</div><img src="${src}">`;
        grid.appendChild(div);
    }

    function syncStateFromDOM() {
        const imgs = grid.querySelectorAll('.item img');
        const labels = grid.querySelectorAll('.sort-number');
        state.photos = [];
        imgs.forEach((img, i) => {
            state.photos.push(img.src);
            labels[i].innerText = i + 1;
        });
        updateUI();
    }

    function updateUI() {
        const count = state.photos.length;
        saveBtn.disabled = count === 0;
        saveBtn.innerText = count > 0 ? `GENERATE (${count}/${state.max})` : "GENERATE PDF";
        
        const label = document.getElementById('upload-label');
        if (count >= state.max) {
            label.style.display = 'none';
            statusText.innerText = "CAPACITY REACHED";
            statusText.style.color = "var(--danger)";
        } else {
            label.style.display = 'flex';
            statusText.innerText = `LIMIT: ${state.max} SLOTS`;
            statusText.style.color = "";
        }
    }
</script>

</body>
</html>
