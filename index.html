<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page Forge | Digital Document Architecture</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --accent: #ffffff;
            --text-muted: #666666;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
            user-select: none; 
            -webkit-user-select: none;
            touch-action: pan-y; /* Improves scroll/drag stability */
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #fff;
            margin: 0;
            min-height: 100vh;
        }

        header { padding: 80px 20px 60px; text-align: center; }
        header h1 { font-weight: 400; font-size: 2.8rem; letter-spacing: -0.04em; margin: 0; text-transform: lowercase; }
        .branding-sub { color: var(--text-muted); font-weight: 200; font-size: 0.75rem; margin-top: 8px; letter-spacing: 0.4em; text-transform: uppercase; }

        .workspace {
            max-width: 1200px; margin: 0 auto; width: 100%;
            padding: 0 20px 100px; display: grid; grid-template-columns: 1fr; gap: 40px;
        }

        @media (min-width: 1024px) { .workspace { grid-template-columns: 320px 1fr; } }

        .control-panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 35px; height: fit-content;
            position: sticky; top: 40px;
        }

        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); margin-bottom: 30px; display: block; }

        .btn {
            width: 100%; padding: 18px; border-radius: 14px; font-size: 0.9rem; font-weight: 500;
            cursor: pointer; transition: all 0.3s ease; border: none; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:disabled { background: #1a1a1a; color: #444; }

        .btn-secondary { background: transparent; border: 1px solid var(--border); color: #fff; }

        /* Elegant Minimalist Reset */
        .btn-reset {
            background: none; border: none; color: var(--text-muted);
            font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
            margin-top: 40px; width: 100%; cursor: pointer; transition: 0.3s;
            padding: 10px; opacity: 0.6;
        }
        .btn-reset:hover { color: #fff; opacity: 1; text-decoration: line-through; }

        .gallery { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; min-height: 500px; }

        #sortable-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 20px;
        }

        .item {
            aspect-ratio: 1; background: #000; border-radius: 10px;
            overflow: hidden; border: 1px solid var(--border);
            position: relative; transition: border-color 0.3s ease;
            will-change: transform; /* Boosts drag performance */
        }

        .item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .sort-number {
            position: absolute; top: 6px; left: 6px;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px);
            color: #fff; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1); z-index: 2;
        }

        /* Smooth Drag Styling */
        .sortable-ghost { opacity: 0.2; transform: scale(0.9); }
        .sortable-drag { opacity: 0.9; cursor: grabbing; box-shadow: 0 15px 30px rgba(0,0,0,0.6); }

        input[type="file"] { display: none; }
        .empty { grid-column: 1 / -1; text-align: center; padding: 150px 0; color: var(--text-muted); font-size: 0.85rem; letter-spacing: 0.05em; }
    </style>
</head>
<body>

<header>
    <h1>page forge</h1>
    <div class="branding-sub">Aethercore Interactive</div>
</header>

<div class="workspace">
    <aside class="control-panel">
        <span class="label">Architecture</span>
        
        <label for="uploader" class="btn btn-primary">
            Add Photos
            <input type="file" id="uploader" multiple accept="image/*" onchange="addPhotos(this.files)">
        </label>
        
        <button class="btn btn-secondary" id="saveBtn" onclick="saveAsPDF()" disabled>
            Save as PDF
        </button>

        <div style="margin-top: 40px; font-size: 0.75rem; color: var(--text-muted); line-height: 1.8; font-weight: 300;">
            Long-press and hold an image to re-sequence your document.
        </div>

        <button class="btn-reset" onclick="location.reload()">Clear Workspace</button>
    </aside>

    <main class="gallery">
        <div id="sortable-grid">
            <div class="empty">Foundry inactive.</div>
        </div>
    </main>
</div>

<script>
    let photoVault = [];

    document.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('sortable-grid');
        new Sortable(grid, {
            animation: 300,
            delay: 400, // Hold for 400ms to grab
            delayOnTouchOnly: true,
            swapThreshold: 0.65,
            forceFallback: true, // Creates a smoother "floating" drag on mobile
            fallbackOnBody: true,
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag',
            onEnd: refreshOrder
        });
    });

    async function addPhotos(files) {
        const grid = document.getElementById('sortable-grid');
        const empty = document.querySelector('.empty');
        if (empty) empty.remove();

        for (let file of files) {
            const data = await toBase64(file);
            photoVault.push(data);
            
            const card = document.createElement('div');
            card.className = 'item';
            card.innerHTML = `<div class="sort-number">${photoVault.length}</div><img src="${data}">`;
            grid.appendChild(card);
        }
        updateStatus();
    }

    function toBase64(file) {
        return new Promise(res => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
        });
    }

    function refreshOrder() {
        const images = document.querySelectorAll('.item img');
        const badges = document.querySelectorAll('.sort-number');
        const newVault = [];
        images.forEach((img, i) => {
            newVault.push(img.src);
            badges[i].innerText = i + 1;
        });
        photoVault = newVault;
    }

    function updateStatus() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = photoVault.length === 0;
        if (!btn.disabled) btn.innerText = `Save PDF (${photoVault.length})`;
    }

    async function saveAsPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'a4');
        const pw = doc.internal.pageSize.getWidth();
        const ph = doc.internal.pageSize.getHeight();

        for (let i = 0; i < photoVault.length; i++) {
            if (i > 0) doc.addPage();
            doc.addImage(photoVault[i], 'JPEG', 40, 40, pw - 80, ph - 80, undefined, 'MEDIUM');
        }
        doc.save("document.pdf");
    }
</script>

</body>
</html>
