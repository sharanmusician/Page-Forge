<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile PDF Forge</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --card: #111;
            --accent: #ffffff;
            --border: #222;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin: 20px 0; }
        .header h1 { font-size: 1.5rem; letter-spacing: -0.05em; margin: 0; }

        .controls {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            position: sticky;
            top: 10px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
        }

        .btn-add { background: var(--accent); color: #000; }
        .btn-save { background: #222; color: #fff; border: 1px solid var(--border); }
        .btn-reset { background: transparent; color: #666; font-size: 0.75rem; }

        .grid {
            width: 100%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .item {
            aspect-ratio: 1;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
        }

        .item img { width: 100%; height: 100%; object-fit: cover; }
        .badge {
            position: absolute; top: 5px; left: 5px;
            background: rgba(0,0,0,0.8);
            font-size: 10px; padding: 2px 6px; border-radius: 4px;
        }

        .empty-text {
            grid-column: 1 / -1;
            text-align: center;
            color: #444;
            padding: 50px 0;
            font-size: 0.8rem;
        }

        .footer-info {
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid var(--border);
            color: #555;
            font-size: 0.8rem;
            line-height: 1.5;
            max-width: 500px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>page forge</h1>
</div>

<div class="controls">
    <label class="btn btn-add">
        Add Images (Max 20)
        <input type="file" id="input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
    </label>
    
    <button id="saveBtn" class="btn btn-save" onclick="downloadPDF()" disabled>Download PDF</button>
    <button class="btn btn-reset" onclick="clearWorkspace()">Reset All</button>
</div>

<div id="grid" class="grid">
    <div class="empty-text">No images added yet.</div>
</div>

<div class="footer-info">
    <h3>Instructions</h3>
    <p>1. <b>Add:</b> Select up to 20 images.</p>
    <p>2. <b>Order:</b> Drag and drop images to change sequence.</p>
    <p>3. <b>Download:</b> Tap the save button. You can tap it multiple times to generate fresh copies instantly.</p>
</div>

<script>
    const grid = document.getElementById('grid');
    const saveBtn = document.getElementById('saveBtn');

    // Enable reordering
    new Sortable(grid, {
        animation: 150,
        onEnd: updateCounters
    });

    async function handleFiles(files) {
        const existingCount = grid.querySelectorAll('.item').length;
        if (existingCount + files.length > 20) {
            alert("Limit: 20 images");
            return;
        }

        const empty = document.querySelector('.empty-text');
        if (empty) empty.remove();

        for (let file of files) {
            const base64 = await toBase64(file);
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<div class="badge"></div><img src="${base64}">`;
            grid.appendChild(div);
        }
        updateCounters();
    }

    function toBase64(file) {
        return new Promise(r => {
            const reader = new FileReader();
            reader.onload = () => r(reader.result);
            reader.readAsDataURL(file);
        });
    }

    function updateCounters() {
        const items = grid.querySelectorAll('.item');
        items.forEach((item, index) => {
            item.querySelector('.badge').innerText = index + 1;
        });
        saveBtn.disabled = items.length === 0;
    }

    function clearWorkspace() {
        if (confirm("Reset everything?")) {
            grid.innerHTML = '<div class="empty-text">No images added yet.</div>';
            document.getElementById('input').value = "";
            updateCounters();
        }
    }

    async function downloadPDF() {
        const imgs = grid.querySelectorAll('.item img');
        if (imgs.length === 0) return;

        // Visual feedback
        const originalText = saveBtn.innerText;
        saveBtn.innerText = "Downloading...";

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'a4');
        const w = doc.internal.pageSize.getWidth();
        const h = doc.internal.pageSize.getHeight();

        // Immediate generation for repeat clicking
        for (let i = 0; i < imgs.length; i++) {
            if (i > 0) doc.addPage();
            // 'FAST' compression for mobile performance
            doc.addImage(imgs[i].src, 'JPEG', 20, 20, w - 40, h - 40, undefined, 'FAST');
        }

        doc.save(`Export_${Date.now()}.pdf`);
        
        // Reset button immediately so user can click again
        setTimeout(() => {
            saveBtn.innerText = originalText;
        }, 500);
    }
</script>

</body>
</html>
