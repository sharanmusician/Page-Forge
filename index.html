<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAGE FORGE | Archive the Future</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glow: #00f2ff;
            --deep: #020617;
            --panel: rgba(15, 23, 42, 0.6);
            --border: rgba(0, 242, 255, 0.2);
            --font-main: 'Inter', sans-serif;
            --font-cinema: 'Syncopate', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font-main);
            background-color: var(--deep);
            color: white;
            margin: 0;
            overflow-x: hidden;
            /* Animated background gradient */
            background: radial-gradient(circle at 50% -20%, #1e293b, var(--deep));
        }

        /* Cinematic HUD Header */
        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: relative;
        }

        header::after {
            content: ""; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 1px; background: var(--glow); box-shadow: 0 0 15px var(--glow);
        }

        h1 {
            font-family: var(--font-cinema);
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            letter-spacing: 12px;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 30%, var(--glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Workspace Layout */
        .master-container {
            max-width: 1400px; margin: 0 auto; padding: 40px 20px;
            display: grid; grid-template-columns: 1fr; gap: 30px;
        }

        @media (min-width: 1024px) {
            .master-container { grid-template-columns: 350px 1fr; }
        }

        /* Control Unit (The Interface) */
        .control-unit {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px; /* Brutalist sharp edges */
            padding: 30px;
            height: fit-content;
            position: sticky; top: 40px;
        }

        /* Futuristic Buttons */
        .cyber-btn {
            width: 100%; padding: 20px; margin-bottom: 15px;
            background: transparent; border: 1px solid var(--border);
            color: var(--glow); font-family: var(--font-cinema); font-size: 0.7rem;
            letter-spacing: 2px; cursor: pointer; position: relative;
            overflow: hidden; transition: 0.4s;
        }

        .cyber-btn:hover {
            background: var(--glow); color: var(--deep);
            box-shadow: 0 0 30px var(--glow);
        }

        .btn-forge {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--glow);
            font-weight: 700;
        }

        /* Sorting Grid (The Foundry) */
        .foundry {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            min-height: 60vh; border-radius: 4px; padding: 20px;
            position: relative;
        }

        #sortable-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* The Assets */
        .asset-card {
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
            aspect-ratio: 1;
            cursor: grab;
            overflow: hidden;
            transition: 0.3s;
        }

        .asset-card:hover { border-color: var(--glow); transform: scale(1.02); z-index: 10; }
        .asset-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .asset-card:hover img { opacity: 1; }

        .index-tag {
            position: absolute; top: 0; left: 0;
            background: var(--glow); color: var(--deep);
            padding: 2px 8px; font-family: var(--font-cinema); font-size: 0.6rem;
        }

        /* Sorting Animation Classes */
        .sortable-ghost { opacity: 0; }
        .sortable-chosen { filter: hue-rotate(90deg); border: 2px solid var(--glow); }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            #sortable-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            h1 { letter-spacing: 5px; }
        }

        input[type="file"] { display: none; }
        
        .empty-msg {
            text-align: center; padding: 100px 0; color: var(--text-muted);
            text-transform: uppercase; font-family: var(--font-cinema); font-size: 0.7rem;
            letter-spacing: 4px; opacity: 0.4;
        }
    </style>
</head>
<body>

<header>
    <h1>PAGE FORGE</h1>
    <p style="font-size: 0.6rem; letter-spacing: 5px; opacity: 0.5;">ARCHIVE // VISUAL // ENGINE</p>
</header>

<div class="master-container">
    
    <aside class="control-unit">
        <div style="margin-bottom: 40px;">
            <div style="font-size: 0.7rem; color: var(--glow); margin-bottom: 10px;">[ SYSTEM STATUS: READY ]</div>
            <div style="height: 2px; width: 100%; background: rgba(255,255,255,0.05);">
                <div id="progress-bar" style="height: 100%; width: 0%; background: var(--glow); transition: 0.5s;"></div>
            </div>
        </div>

        <label for="uploader" class="cyber-btn">
            + UPLOAD_DATA
            <input type="file" id="uploader" multiple accept="image/*" onchange="ingestFiles(this.files)">
        </label>
        
        <button class="cyber-btn btn-forge" id="forge-btn" onclick="forgeFinalPDF()" disabled>
            GENERATE_PDF
        </button>
        
        <button class="cyber-btn" style="border-color: #ff3e3e; color: #ff3e3e;" onclick="window.location.reload()">
            TERMINATE
        </button>
    </aside>

    <main class="foundry">
        <div id="sortable-grid">
            <div class="empty-msg">Waiting for Data Input...</div>
        </div>
    </main>

</div>

<script>
    let archive = [];

    // Initialize Sortable with touch support
    document.addEventListener('DOMContentLoaded', () => {
        const el = document.getElementById('sortable-grid');
        new Sortable(el, {
            animation: 400,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            onEnd: reorderArchive
        });
    });

    async function ingestFiles(files) {
        const grid = document.getElementById('sortable-grid');
        const empty = document.querySelector('.empty-msg');
        if (empty) empty.remove();

        for (let file of files) {
            const data = await convert(file);
            archive.push(data);
            
            const card = document.createElement('div');
            card.className = 'asset-card';
            card.innerHTML = `
                <div class="index-tag">STP_${archive.length}</div>
                <img src="${data}">
            `;
            grid.appendChild(card);
        }
        updateUI();
    }

    function convert(file) {
        return new Promise(res => {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = () => res(r.target.result);
        });
    }

    function reorderArchive() {
        const cards = document.querySelectorAll('.asset-card img');
        const tags = document.querySelectorAll('.index-tag');
        const newArchive = [];
        cards.forEach((img, i) => {
            newArchive.push(img.src);
            tags[i].innerText = `STP_${i + 1}`;
        });
        archive = newArchive;
    }

    function updateUI() {
        const btn = document.getElementById('forge-btn');
        const bar = document.getElementById('progress-bar');
        btn.disabled = archive.length === 0;
        bar.style.width = archive.length > 0 ? '100%' : '0%';
    }

    async function forgeFinalPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const w = doc.internal.pageSize.getWidth();
        const h = doc.internal.pageSize.getHeight();

        for (let i = 0; i < archive.length; i++) {
            if (i > 0) doc.addPage();
            // High fidelity fit
            doc.addImage(archive[i], 'JPEG', 0, 0, w, h, undefined, 'FAST');
        }

        doc.save(`FORGE_RESULT_${Date.now()}.pdf`);
    }
</script>

</body>
</html>
