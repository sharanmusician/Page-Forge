<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page Forge | Architectural Document Foundry</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --text-muted: #555555;
            --success: #f0f0f0;
            --danger: #ff3b30;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; overflow-x: hidden; }

        .app-wrapper { max-width: 1200px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 40px; }

        header { text-align: center; padding: 20px 0; }
        header h1 { font-weight: 100; font-size: 2.2rem; letter-spacing: -0.06em; margin: 0; text-transform: lowercase; }
        .branding-sub { color: var(--text-muted); font-weight: 400; font-size: 0.55rem; margin-top: 8px; letter-spacing: 0.5em; text-transform: uppercase; }

        @media (min-width: 1024px) {
            .app-wrapper { display: grid; grid-template-columns: 320px 1fr; align-items: start; padding-top: 60px; }
            header { grid-column: 1 / -1; text-align: left; }
            .control-panel { position: sticky; top: 40px; }
        }

        .control-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; gap: 12px; }

        .btn { width: 100%; height: 54px; border-radius: 12px; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: 0.3s; border: none; display: flex; align-items: center; justify-content: center; letter-spacing: 0.1em; text-transform: uppercase; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-action { background: transparent; border: 1px solid var(--border); color: #fff; }
        .btn-action:disabled { opacity: 0.1; cursor: not-allowed; }
        .btn-action.complete { background: var(--success); color: #000; border: none; }

        .gallery { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 15px; min-height: 400px; }

        /* STRICT 3-IMAGE ROW */
        #sortable-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .item { aspect-ratio: 1; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); position: relative; touch-action: none; transition: opacity 0.3s; }
        .item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .sort-number { position: absolute; top: 6px; left: 6px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); color: #fff; font-size: 0.5rem; padding: 3px 6px; border-radius: 4px; z-index: 2; }

        /* Smaller Delete Button */
        .delete-trigger { 
            position: absolute; top: 0; right: 0; width: 26px; height: 26px; 
            background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); color: #fff; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.9rem; font-weight: 200; cursor: pointer; z-index: 5; 
            border-bottom-left-radius: 8px; transition: 0.2s;
        }
        .delete-trigger:hover { background: var(--danger); }

        /* FOCUS OVERLAY SYSTEM */
        #focus-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; padding: 20px;
        }

        #focus-overlay.active { display: flex; }

        #focus-card {
            width: 320px; height: 320px; background: #000; border-radius: 12px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
            position: relative; box-shadow: 0 40px 100px rgba(0,0,0,1);
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #focus-card img { width: 100%; height: 100%; object-fit: cover; }

        .confirm-bar {
            width: 320px; height: 50px; background: var(--danger); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; cursor: pointer; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;
            margin-top: -1px; /* Seamless fit with card */
        }

        .cancel-hint { color: var(--text-muted); font-size: 0.6rem; margin-top: 20px; text-transform: uppercase; letter-spacing: 0.2em; }

        .empty { grid-column: 1 / -1; text-align: center; padding: 100px 0; color: #222; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .sortable-ghost { opacity: 0; }
    </style>
</head>
<body>

<div id="focus-overlay" onclick="cancelDelete()">
    <div id="focus-card" onclick="event.stopPropagation()">
        <img id="focus-img" src="">
        <div class="confirm-bar" onclick="executeDelete()">Confirm Delete</div>
    </div>
    <div class="cancel-hint">Tap anywhere to cancel</div>
</div>

<div class="app-wrapper">
    <header>
        <h1>page forge</h1>
        <div class="branding-sub">Aethercore Interactive</div>
    </header>

    <aside class="control-panel">
        <label for="uploader" class="btn btn-primary">
            Upload Assets
            <input type="file" id="uploader" multiple accept="image/*" style="display:none" onchange="addPhotos(this.files)">
        </label>
        
        <button class="btn btn-action" id="mainBtn" onclick="handleAction()" disabled>
            Generate PDF
        </button>
    </aside>

    <main class="gallery">
        <div id="sortable-grid">
            <div class="empty">Foundry Offline</div>
        </div>
    </main>
</div>

<script>
    const grid = document.getElementById('sortable-grid');
    const mainBtn = document.getElementById('mainBtn');
    const overlay = document.getElementById('focus-overlay');
    const focusImg = document.getElementById('focus-img');
    let isComplete = false;
    let targetCard = null;

    new Sortable(grid, {
        animation: 250,
        ghostClass: 'sortable-ghost',
        filter: '.delete-trigger',
        onEnd: syncIndices
    });

    async function addPhotos(files) {
        if (grid.querySelectorAll('.item').length + files.length > 20) return;
        const empty = document.querySelector('.empty');
        if (empty) empty.remove();

        for (let file of files) {
            const data = await toBase64(file);
            const card = document.createElement('div');
            card.className = 'item';
            card.dataset.id = Date.now() + Math.random();
            card.innerHTML = `
                <div class="sort-number"></div>
                <div class="delete-trigger" onclick="openFocus(this)">×</div>
                <img src="${data}">
            `;
            grid.appendChild(card);
        }
        resetState();
        syncIndices();
    }

    function toBase64(file) {
        return new Promise(res => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.readAsDataURL(file);
        });
    }

    function openFocus(trigger) {
        targetCard = trigger.parentElement;
        focusImg.src = targetCard.querySelector('img').src;
        overlay.classList.add('active');
    }

    function cancelDelete() {
        overlay.classList.remove('active');
        targetCard = null;
    }

    function executeDelete() {
        if (targetCard) {
            targetCard.remove();
            cancelDelete();
            if (grid.querySelectorAll('.item').length === 0) {
                grid.innerHTML = '<div class="empty">Foundry Offline</div>';
            }
            resetState();
            syncIndices();
        }
    }

    function syncIndices() {
        const items = grid.querySelectorAll('.item');
        items.forEach((item, i) => {
            item.querySelector('.sort-number').innerText = String(i + 1).padStart(2, '0');
        });
        if (!isComplete) {
            mainBtn.disabled = items.length === 0;
            if (items.length > 0) mainBtn.innerText = `Generate PDF (${items.length})`;
        }
    }

    function resetState() {
        isComplete = false;
        mainBtn.classList.remove('complete');
        syncIndices();
    }

    function handleAction() {
        if (isComplete) resetState();
        forgeDocument();
    }

    function forgeDocument() {
        const images = grid.querySelectorAll('.item img');
        mainBtn.innerText = "Forging...";
        mainBtn.disabled = true;
        
        setTimeout(() => {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'pt', 'a4');
                images.forEach((img, i) => {
                    if (i > 0) doc.addPage();
                    doc.addImage(img.src, 'JPEG', 0, 0, doc.internal.pageSize.getWidth(), doc.internal.pageSize.getHeight(), undefined, 'NONE');
                });
                doc.save(`PageForge_${Date.now()}.pdf`);
                isComplete = true;
                mainBtn.disabled = false;
                mainBtn.innerText = "Download Success";
                mainBtn.classList.add('complete');
            } catch (err) {
                mainBtn.innerText = "Error";
                mainBtn.disabled = false;
            }
        }, 200);
    }
</script>

</body>
</html>
