<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Forge | Easy Image to PDF</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 40px; margin-top: 40px; }
        h1 { font-size: 2.5rem; margin: 0; letter-spacing: -1px; }
        p { opacity: 0.7; margin-top: 8px; }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Simplified Buttons */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .controls { grid-template-columns: 1fr; }
        }

        .btn {
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            text-align: center;
        }

        .btn-select { background: #fff; color: #000; }
        .btn-make { background: var(--accent); color: #fff; }
        .btn-make:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .btn-clear { background: transparent; color: #94a3b8; grid-column: span 2; font-weight: 400; margin-top: 10px;}
        @media (max-width: 600px) { .btn-clear { grid-column: span 1; } }

        /* Photo Grid */
        #photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            min-height: 150px;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
        }

        .photo-card {
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            cursor: grab;
            position: relative;
            border: 2px solid transparent;
        }

        .photo-card:active { cursor: grabbing; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .number-tag {
            position: absolute; top: 5px; left: 5px;
            background: rgba(0,0,0,0.6); padding: 2px 6px;
            border-radius: 4px; font-size: 10px;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<header>
    <h1>Page Forge</h1>
    <p>Drag photos to change their order</p>
</header>

<div class="container">
    <div class="controls">
        <label class="btn btn-select">
            Add Photos
            <input type="file" id="fileInput" multiple accept="image/*" onchange="addPhotos(this.files)">
        </label>
        
        <button id="makeBtn" class="btn btn-make" onclick="makePDF()" disabled>
            Save as PDF
        </button>

        <button class="btn btn-clear" onclick="window.location.reload()">
            Start Over
        </button>
    </div>

    <div id="photo-grid">
        </div>
</div>

<script>
    let photoList = [];

    // Drag and drop setup
    document.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('photo-grid');
        new Sortable(grid, {
            animation: 250,
            onEnd: updateOrder
        });
    });

    async function addPhotos(files) {
        const grid = document.getElementById('photo-grid');
        
        for (let file of files) {
            const url = await convertFile(file);
            photoList.push(url);
            
            const div = document.createElement('div');
            div.className = 'photo-card';
            div.innerHTML = `<img src="${url}"><div class="number-tag">${photoList.length}</div>`;
            grid.appendChild(div);
        }
        checkButton();
    }

    function convertFile(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }

    function updateOrder() {
        const images = document.querySelectorAll('.photo-card img');
        const tags = document.querySelectorAll('.number-tag');
        const newList = [];
        images.forEach((img, i) => {
            newList.push(img.src);
            tags[i].innerText = i + 1;
        });
        photoList = newList;
    }

    function checkButton() {
        const btn = document.getElementById('makeBtn');
        btn.disabled = photoList.length === 0;
        if(photoList.length > 0) {
            btn.innerText = `Save ${photoList.length} Photos as PDF`;
        }
    }

    // THE FIX: Better PDF Generation
    async function makePDF() {
        const btn = document.getElementById('makeBtn');
        const originalText = btn.innerText;
        btn.innerText = "Working...";
        btn.disabled = true;

        try {
            const { jsPDF } = window.jspdf;
            // Use 'pt' and 'a4' for the most reliable results
            const doc = new jsPDF('p', 'pt', 'a4');
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();

            for (let i = 0; i < photoList.length; i++) {
                if (i > 0) doc.addPage();
                
                // Scale the image to fit the page properly
                // Setting alias to 'FAST' helps with memory issues
                doc.addImage(photoList[i], 'JPEG', 20, 20, pageWidth - 40, pageHeight - 40, undefined, 'FAST');
            }

            doc.save("my-document.pdf");
        } catch (err) {
            alert("Sorry, something went wrong. Try using fewer or smaller photos.");
            console.error(err);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
