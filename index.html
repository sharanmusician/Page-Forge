<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page Forge | Aethercore Interactive</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0a; --surface: #121212; --accent: #ffffff;
            --text-muted: #666666; --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; user-select: none; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }

        header { padding: 80px 20px 40px; text-align: center; }
        header h1 { font-weight: 400; font-size: 2.8rem; letter-spacing: -0.06em; margin: 0; text-transform: lowercase; }
        .branding-sub { color: var(--text-muted); font-weight: 200; font-size: 0.7rem; margin-top: 10px; letter-spacing: 0.5em; text-transform: uppercase; }

        .workspace { max-width: 1200px; margin: 0 auto; padding: 0 20px 100px; display: grid; grid-template-columns: 1fr; gap: 40px; }
        @media (min-width: 1024px) { .workspace { grid-template-columns: 320px 1fr; } }

        .control-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px; height: fit-content; }
        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.3em; color: var(--text-muted); margin-bottom: 30px; display: block; }

        /* Restored Bold Aesthetic Buttons */
        .btn {
            width: 100%; padding: 20px; border-radius: 12px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: none; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center; text-transform: uppercase; letter-spacing: 0.1em;
        }

        .btn-primary { background: var(--accent); color: #000; box-shadow: 0 4px 20px rgba(255,255,255,0.1); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { background: #1a1a1a; color: #444; box-shadow: none; cursor: not-allowed; }

        .btn-secondary { background: transparent; border: 1px solid var(--border); color: #fff; }
        .btn-secondary:hover { border-color: var(--accent); background: rgba(255,255,255,0.03); }

        .btn-reset {
            background: none; border: none; color: var(--text-muted); font-size: 0.65rem; 
            letter-spacing: 0.2em; text-transform: uppercase; margin-top: 40px; 
            width: 100%; cursor: pointer; transition: 0.3s;
        }
        .btn-reset:hover { color: #ff4444; text-decoration: line-through; }

        /* Gallery Layout */
        .gallery { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 35px; min-height: 500px; }
        #sortable-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 20px; }

        .item { aspect-ratio: 1; background: #000; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); position: relative; transition: border 0.3s; }
        .item:hover { border-color: rgba(255,255,255,0.2); }
        .item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .sort-number {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(8px); color: #fff; font-size: 0.65rem; 
            padding: 4px 8px; border-radius: 6px; z-index: 2; border: 1px solid rgba(255,255,255,0.15);
        }

        .limit-note { font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-top: 20px; letter-spacing: 0.05em; }

        input[type="file"] { display: none; }
        #empty-state { grid-column: 1/-1; text-align: center; padding: 150px 0; color: #333; font-size: 0.8rem; letter-spacing: 0.2em; }
    </style>
</head>
<body>

<header>
    <h1>page forge</h1>
    <div class="branding-sub">Aethercore Interactive</div>
</header>

<div class="workspace">
    <aside class="control-panel">
        <span class="label">System Input</span>
        
        <label for="uploader" class="btn btn-primary" id="uploadLabel">
            <span>Add Assets</span>
            <input type="file" id="uploader" multiple accept="image/*">
        </label>
        
        <button class="btn btn-secondary" id="saveBtn" disabled>Generate PDF</button>
        <button class="btn-reset" id="resetBtn">Reset Workspace</button>
        
        <div class="limit-note" id="limitText">20 Image Maximum</div>
    </aside>

    <main class="gallery">
        <div id="sortable-grid">
            <div id="empty-state">ARCHIVE EMPTY</div>
        </div>
    </main>
</div>

<script>
    let photoVault = [];
    const MAX_IMAGES = 20;

    const uploader = document.getElementById('uploader');
    const uploadLabel = document.getElementById('uploadLabel');
    const saveBtn = document.getElementById('saveBtn');
    const resetBtn = document.getElementById('resetBtn');
    const grid = document.getElementById('sortable-grid');
    const limitText = document.getElementById('limitText');

    // SMOOTH MOTION ENGINE
    new Sortable(grid, {
        animation: 300,
        delay: 0, 
        forceFallback: true,
        onEnd: refreshOrder
    });

    // UPLOAD LOGIC
    uploader.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        for (let file of files) {
            if (photoVault.length >= MAX_IMAGES) break;
            const data = await toBase64(file);
            photoVault.push(data);
            const empty = document.getElementById('empty-state');
            if (empty) empty.remove();
            const card = document.createElement('div');
            card.className = 'item';
            card.innerHTML = `<div class="sort-number">${photoVault.length}</div><img src="${data}">`;
            grid.appendChild(card);
        }
        checkLimit();
        updateUI();
        uploader.value = ''; 
    });

    // INSTANT GENERATE (NO CONFIRMATION)
    saveBtn.addEventListener('click', function() {
        if (photoVault.length === 0) return;
        saveBtn.innerText = "Processing...";
        saveBtn.disabled = true;

        setTimeout(() => {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'p', unit: 'pt', format: 'a4', compress: true });
                const pw = doc.internal.pageSize.getWidth();
                const ph = doc.internal.pageSize.getHeight();

                photoVault.forEach((imgData, i) => {
                    if (i > 0) doc.addPage();
                    doc.addImage(imgData, 'JPEG', 40, 40, pw - 80, ph - 80, undefined, 'MEDIUM');
                });

                doc.save(`PageForge_Export.pdf`);
            } finally {
                saveBtn.innerText = "Generate PDF";
                saveBtn.disabled = false;
                updateUI();
            }
        }, 50);
    });

    // INSTANT RESET (NO CONFIRMATION)
    resetBtn.addEventListener('click', function() {
        photoVault = [];
        grid.innerHTML = '<div id="empty-state">ARCHIVE EMPTY</div>';
        checkLimit();
        updateUI();
    });

    function toBase64(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }

    function refreshOrder() {
        const images = grid.querySelectorAll('.item img');
        const badges = grid.querySelectorAll('.sort-number');
        const newOrder = [];
        images.forEach((img, i) => {
            newOrder.push(img.src);
            if (badges[i]) badges[i].innerText = i + 1;
        });
        photoVault = newOrder;
    }

    function updateUI() {
        saveBtn.disabled = photoVault.length === 0;
        saveBtn.innerText = photoVault.length > 0 ? `Generate (${photoVault.length}/20)` : "Generate PDF";
    }

    function checkLimit() {
        if (photoVault.length >= MAX_IMAGES) {
            uploadLabel.style.display = "none";
            limitText.innerText = "System Capacity Reached";
            limitText.style.color = "#ff4444";
        } else {
            uploadLabel.style.display = "flex";
            limitText.innerText = "20 Image Maximum";
            limitText.style.color = "";
        }
    }
</script>

</body>
</html>
