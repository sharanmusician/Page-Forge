<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page Forge | Professional PDF Export</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 40px 20px;
        }

        .wrapper { max-width: 900px; margin: 0 auto; }
        
        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h1 { font-weight: 600; letter-spacing: -1px; margin: 0; }
        
        .toolbar {
            display: flex;
            gap: 15px;
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            font-size: 14px;
        }

        .btn-add { background: var(--accent); color: #000; }
        .btn-save { background: #222; color: #fff; border: 1px solid var(--border); }
        .btn-save:not(:disabled):hover { background: #333; }
        .btn-reset { background: transparent; color: #666; font-size: 12px; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .stats { margin-left: auto; font-size: 12px; color: #666; text-align: right; }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            min-height: 200px;
        }

        .card {
            aspect-ratio: 1;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
        }

        .card img { width: 100%; height: 100%; object-fit: cover; }
        .num {
            position: absolute; top: 8px; left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px; border-radius: 4px; font-size: 10px;
        }

        .empty-hint { grid-column: 1/-1; text-align: center; padding: 60px; color: #444; border: 2px dashed #1a1a1a; border-radius: 12px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-section">
        <h1>page forge</h1>
    </div>

    <div class="toolbar">
        <label class="btn btn-add">
            Add Photos
            <input type="file" id="files" multiple accept="image/*" style="display:none" onchange="loadImages(this.files)">
        </label>
        
        <button id="saveBtn" class="btn btn-save" onclick="generatePDF()" disabled>Save PDF</button>
        <button class="btn btn-reset" onclick="resetAll()">Reset</button>

        <div class="stats">
            <div id="countInfo">Images: 0 / 20</div>
            <div id="saveInfo">Exports this session: 0</div>
        </div>
    </div>

    <div id="grid">
        <div class="empty-hint">Foundry empty. Please add images (Max 20).</div>
    </div>
</div>

<script>
    let saveCount = 0;
    const grid = document.getElementById('grid');
    const saveBtn = document.getElementById('saveBtn');

    // Enable drag and drop reordering
    const sortable = new Sortable(grid, {
        animation: 150,
        filter: '.empty-hint',
        onEnd: () => updateLabels()
    });

    async function loadImages(files) {
        const currentCount = grid.querySelectorAll('.card').length;
        
        if (currentCount + files.length > 20) {
            alert("Limit reached. You can only have 20 images total.");
            return;
        }

        const hint = document.querySelector('.empty-hint');
        if (hint) hint.remove();

        for (let file of files) {
            const base64 = await toBase64(file);
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="num"></div><img src="${base64}">`;
            grid.appendChild(div);
        }
        
        updateLabels();
    }

    function toBase64(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }

    function updateLabels() {
        const cards = grid.querySelectorAll('.card');
        cards.forEach((card, i) => {
            card.querySelector('.num').innerText = i + 1;
        });

        const count = cards.length;
        saveBtn.disabled = count === 0;
        document.getElementById('countInfo').innerText = `Images: ${count} / 20`;
    }

    function resetAll() {
        if(confirm("Clear all images and reset workspace?")) {
            grid.innerHTML = '<div class="empty-hint">Foundry empty. Please add images (Max 20).</div>';
            document.getElementById('files').value = "";
            updateLabels();
        }
    }

    async function generatePDF() {
        // 1. Check exactly how many pictures are there right now
        const images = grid.querySelectorAll('.card img');
        const count = images.length;
        
        if (count === 0) return;

        saveBtn.innerText = "Forging...";
        saveBtn.disabled = true;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'a4');
        const w = doc.internal.pageSize.getWidth();
        const h = doc.internal.pageSize.getHeight();

        // 2. Loop through current grid items
        for (let i = 0; i < count; i++) {
            if (i > 0) doc.addPage();
            // Using MEDIUM compression to keep file size reasonable
            doc.addImage(images[i].src, 'JPEG', 40, 40, w - 80, h - 80, undefined, 'MEDIUM');
        }

        // 3. Download
        doc.save(`Forge_Export_${count}_pages.pdf`);

        // 4. Update session stats
        saveCount++;
        document.getElementById('saveInfo').innerText = `Exports this session: ${saveCount}`;
        
        saveBtn.innerText = "Save PDF";
        saveBtn.disabled = false;
    }
</script>

</body>
</html>
