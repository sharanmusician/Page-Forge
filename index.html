<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page Forge | Architectural Document Foundry</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --text-secondary: #666666;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: var(--accent); margin: 0; padding: 0; overflow-x: hidden; }

        .container { max-width: 600px; margin: 0 auto; padding: 60px 20px; }

        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-weight: 200; font-size: 2.2rem; letter-spacing: -0.05em; margin: 0; }
        .branding { font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--text-secondary); margin-top: 8px; }

        .foundry-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            position: sticky;
            top: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .progress-wrap { width: 100%; height: 2px; background: #1a1a1a; margin-bottom: 20px; border-radius: 2px; overflow: hidden; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            width: 100%; height: 56px; border-radius: 14px; border: none; font-weight: 500;
            font-size: 0.9rem; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: transparent; color: #fff; border: 1px solid var(--border); }
        .btn-secondary:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .btn-reset { background: transparent; color: var(--text-secondary); font-size: 0.7rem; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.1em; }

        #grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 30px; 
            min-height: 200px;
        }

        .asset-card {
            aspect-ratio: 1; background: #0f0f0f; border-radius: 12px; border: 1px solid var(--border);
            position: relative; overflow: hidden; transform: translateZ(0);
        }

        .asset-card img { width: 100%; height: 100%; object-fit: cover; }
        .asset-index {
            position: absolute; top: 8px; left: 8px; font-size: 0.6rem;
            background: rgba(0,0,0,0.5); padding: 3px 6px; border-radius: 4px;
            backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.05);
        }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 0; color: var(--text-secondary); font-weight: 200; font-size: 0.85rem; }

        /* Smooth Dragging */
        .sortable-ghost { opacity: 0.3; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>page forge</h1>
        <div class="branding">Aethercore Interactive</div>
    </header>

    <div class="foundry-panel">
        <div class="progress-wrap" id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div class="btn-group">
            <label class="btn btn-primary">
                Add Visual Assets
                <input type="file" id="asset-input" multiple accept="image/*" style="display:none" onchange="handleAssets(this.files)">
            </label>
            
            <button id="download-btn" class="btn btn-secondary" onclick="forgeDocument()" disabled>
                Generate Document
            </button>
        </div>
        
        <button class="btn btn-reset" onclick="resetFoundry()">Reset Workspace</button>
    </div>

    <div id="grid">
        <div class="empty-state">No assets deployed to foundry.</div>
    </div>
</div>

<script>
    const grid = document.getElementById('grid');
    const dlBtn = document.getElementById('download-btn');
    const pBar = document.getElementById('progress-bar');
    const pContainer = document.getElementById('progress-container');

    new Sortable(grid, { 
        animation: 300, 
        ghostClass: 'sortable-ghost',
        onEnd: updateState 
    });

    async function handleAssets(files) {
        const currentCount = grid.querySelectorAll('.asset-card').length;
        if (currentCount + files.length > 20) {
            alert("Foundry limited to 20 assets.");
            return;
        }

        const empty = document.querySelector('.empty-state');
        if (empty) empty.remove();

        for (let file of files) {
            const dataUrl = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });

            const card = document.createElement('div');
            card.className = 'asset-card';
            card.innerHTML = `<div class="asset-index"></div><img src="${dataUrl}">`;
            grid.appendChild(card);
        }
        updateState();
    }

    function updateState() {
        const cards = grid.querySelectorAll('.asset-card');
        cards.forEach((card, i) => card.querySelector('.asset-index').innerText = String(i + 1).padStart(2, '0'));
        
        dlBtn.disabled = cards.length === 0;
        if (cards.length > 0) {
            dlBtn.innerText = `Export PDF (${cards.length})`;
        } else {
            dlBtn.innerText = "Generate Document";
        }
    }

    function resetFoundry() {
        grid.innerHTML = '<div class="empty-state">No assets deployed to foundry.</div>';
        document.getElementById('asset-input').value = "";
        pContainer.style.display = 'none';
        updateState();
    }

    async function forgeDocument() {
        const images = grid.querySelectorAll('.asset-card img');
        if (!images.length) return;

        // Visual feedback
        dlBtn.innerText = "Forging PDF...";
        dlBtn.disabled = true;
        pContainer.style.display = 'block';
        pBar.style.width = '0%';

        const { jsPDF } = window.jspdf;
        // Use pt for exact architectural scaling
        const doc = new jsPDF('p', 'pt', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();

        for (let i = 0; i < images.length; i++) {
            if (i > 0) doc.addPage();
            
            try {
                // We add as JPEG at 0.95 quality for RAW appearance without the crash-heavy size
                doc.addImage(images[i].src, 'JPEG', 0, 0, pageWidth, pageHeight, undefined, 'FAST');
            } catch (e) {
                console.error("Asset generation error at index", i);
            }

            // Update UI progress
            const progress = ((i + 1) / images.length) * 100;
            pBar.style.width = `${progress}%`;
            
            // Critical: Small break to let the browser breathe
            await new Promise(r => setTimeout(r, 60));
        }

        // Finalize and Save
        const filename = `Forge_Export_${Date.now()}.pdf`;
        doc.save(filename);

        // Success State
        setTimeout(() => {
            pContainer.style.display = 'none';
            updateState();
        }, 1000);
    }
</script>

</body>
</html>
