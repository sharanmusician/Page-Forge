<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page Forge | Architectural Document Foundry</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --text-muted: #555555;
            --success: #f0f0f0;
            --danger: #ff3b30;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .app-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        header { text-align: center; padding: 20px 0; }
        header h1 { font-weight: 100; font-size: 2.2rem; letter-spacing: -0.06em; margin: 0; text-transform: lowercase; }
        .branding-sub { color: var(--text-muted); font-weight: 400; font-size: 0.55rem; margin-top: 8px; letter-spacing: 0.5em; text-transform: uppercase; }

        @media (min-width: 1024px) {
            .app-wrapper { display: grid; grid-template-columns: 320px 1fr; align-items: start; padding-top: 60px; }
            header { grid-column: 1 / -1; text-align: left; }
            .control-panel { position: sticky; top: 40px; }
        }

        .control-panel {
            background: var(--surface); 
            border: 1px solid var(--border);
            border-radius: 20px; 
            padding: 25px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .btn {
            width: 100%; height: 54px; border-radius: 12px; font-size: 0.8rem; font-weight: 500;
            cursor: pointer; transition: 0.3s; border: none;
            display: flex; align-items: center; justify-content: center; letter-spacing: 0.1em; text-transform: uppercase;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-action { background: transparent; border: 1px solid var(--border); color: #fff; }
        .btn-action:disabled { opacity: 0.1; cursor: not-allowed; }
        .btn-action.complete { background: var(--success); color: #000; border: none; }

        .gallery { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 15px; 
            min-height: 400px;
        }

        /* STRICT 3-IMAGE ROW ORDER */
        #sortable-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            transition: 0.4s ease;
        }

        .item {
            aspect-ratio: 1; 
            background: #000; 
            border-radius: 10px;
            overflow: hidden; 
            border: 1px solid var(--border);
            position: relative; 
            touch-action: none;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            z-index: 1;
        }

        .item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .sort-number {
            position: absolute; top: 8px; left: 8px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
            color: #fff; font-size: 0.55rem; padding: 4px 8px; border-radius: 5px;
            z-index: 2;
        }

        .delete-trigger {
            position: absolute; top: 0; right: 0; width: 34px; height: 34px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 200; cursor: pointer; z-index: 5;
            border-bottom-left-radius: 10px;
        }

        /* ELEVATION & POP-UP CONFIRMATION */
        .item.confirm-delete {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 320px; /* Elevated size */
            height: 320px;
            margin-top: -160px;
            margin-left: -160px;
            z-index: 9999;
            transform: scale(1.1);
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
        }

        @media (max-width: 600px) {
            .item.confirm-delete { width: 85vw; height: 85vw; margin-top: -42.5vw; margin-left: -42.5vw; }
        }

        .confirm-footer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50px;
            background: var(--danger); color: #fff; 
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.15em; opacity: 0; transition: 0.3s 0.2s;
            pointer-events: none; z-index: 6;
        }

        .item.confirm-delete .confirm-footer { opacity: 1; pointer-events: auto; cursor: pointer; }
        
        /* Blur Background Layers */
        .dim-others #sortable-grid { filter: blur(10px); opacity: 0.2; pointer-events: none; }
        .dim-others header, .dim-others .control-panel { filter: blur(5px); opacity: 0.5; pointer-events: none; }

        .empty { grid-column: 1 / -1; text-align: center; padding: 100px 0; color: #222; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; }
        .sortable-ghost { opacity: 0; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <h1>page forge</h1>
        <div class="branding-sub">Aethercore Interactive</div>
    </header>

    <aside class="control-panel">
        <label for="uploader" class="btn btn-primary">
            Upload Assets
            <input type="file" id="uploader" multiple accept="image/*" style="display:none" onchange="addPhotos(this.files)">
        </label>
        
        <button class="btn btn-action" id="mainBtn" onclick="handleAction()" disabled>
            Synthesize PDF
        </button>
    </aside>

    <main class="gallery" id="gallery-container">
        <div id="sortable-grid">
            <div class="empty">Foundry Offline</div>
        </div>
    </main>
</div>

<script>
    const grid = document.getElementById('sortable-grid');
    const mainBtn = document.getElementById('mainBtn');
    const galleryContainer = document.getElementById('gallery-container');
    let isComplete = false;

    new Sortable(grid, {
        animation: 300,
        ghostClass: 'sortable-ghost',
        filter: '.delete-trigger, .confirm-footer',
        onEnd: syncIndices
    });

    async function addPhotos(files) {
        const currentCount = grid.querySelectorAll('.item').length;
        if (currentCount + files.length > 20) return;

        const empty = document.querySelector('.empty');
        if (empty) empty.remove();

        for (let file of files) {
            const data = await toBase64(file);
            const card = document.createElement('div');
            card.className = 'item';
            card.innerHTML = `
                <div class="sort-number"></div>
                <div class="delete-trigger" onclick="initiateDelete(event, this)">×</div>
                <div class="confirm-footer" onclick="completeDelete(event, this)">Confirm Delete</div>
                <img src="${data}">
            `;
            grid.appendChild(card);
        }
        resetDownloadState();
        syncIndices();
    }

    function toBase64(file) {
        return new Promise(res => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.readAsDataURL(file);
        });
    }

    function initiateDelete(e, trigger) {
        e.stopPropagation();
        const card = trigger.parentElement;
        document.body.classList.add('dim-others');
        card.classList.add('confirm-delete');
        
        // Cancel deletion if clicking outside the elevated image
        const closeOnOuterClick = (ev) => {
            if (!card.contains(ev.target)) {
                document.body.classList.remove('dim-others');
                card.classList.remove('confirm-delete');
                document.removeEventListener('click', closeOnOuterClick);
            }
        };
        setTimeout(() => document.addEventListener('click', closeOnOuterClick), 10);
    }

    function completeDelete(e, btn) {
        e.stopPropagation();
        btn.parentElement.remove();
        document.body.classList.remove('dim-others');
        if (grid.querySelectorAll('.item').length === 0) {
            grid.innerHTML = '<div class="empty">Foundry Offline</div>';
        }
        resetDownloadState();
        syncIndices();
    }

    function syncIndices() {
        const items = grid.querySelectorAll('.item');
        items.forEach((item, i) => {
            item.querySelector('.sort-number').innerText = String(i + 1).padStart(2, '0');
        });
        if (!isComplete) {
            mainBtn.disabled = items.length === 0;
            if (items.length > 0) mainBtn.innerText = `Synthesize PDF (${items.length})`;
        }
    }

    function resetDownloadState() {
        isComplete = false;
        mainBtn.classList.remove('complete');
        syncIndices();
    }

    function handleAction() {
        if (isComplete) resetDownloadState();
        forgeDocument();
    }

    function forgeDocument() {
        const images = grid.querySelectorAll('.item img');
        if (images.length === 0) return;

        mainBtn.innerText = "Forging Assets...";
        mainBtn.disabled = true;
        
        setTimeout(() => {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'pt', 'a4');
                const pw = doc.internal.pageSize.getWidth();
                const ph = doc.internal.pageSize.getHeight();

                images.forEach((img, i) => {
                    if (i > 0) doc.addPage();
                    doc.addImage(img.src, 'JPEG', 0, 0, pw, ph, undefined, 'NONE');
                });

                doc.save(`PageForge_${Date.now()}.pdf`);
                isComplete = true;
                mainBtn.disabled = false;
                mainBtn.innerText = "Extraction Successful";
                mainBtn.classList.add('complete');
            } catch (err) {
                mainBtn.innerText = "Foundry Error";
                mainBtn.disabled = false;
            }
        }, 200);
    }
</script>

</body>
</html>
