<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page Forge | Digital Document Foundry</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Uncut+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050505;
            --bg-panel: #111111;
            --brand-accent: #3b82f6; /* Modern Executive Blue */
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.04);
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; touch-action: manipulation; }
        
        body {
            font-family: 'Uncut Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Minimal Header */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: var(--bg-deep); z-index: 100;
        }

        h1 { font-weight: 700; font-size: 1.2rem; margin: 0; letter-spacing: -0.03em; }
        h1 span { color: var(--text-muted); font-weight: 300; }

        /* Workspace Layout */
        .viewport {
            max-width: 1600px; margin: 0 auto;
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
        }

        @media (min-width: 1024px) {
            .viewport { flex-direction: row-reverse; padding: 40px; }
        }

        /* Sidebar/Controls */
        .controls-panel {
            flex: 0 0 300px; background: var(--bg-panel);
            border: 1px solid var(--border); border-radius: 16px;
            padding: 24px; display: flex; flex-direction: column; gap: 16px;
        }

        /* Elite Action Buttons */
        .action-btn {
            width: 100%; padding: 16px; border-radius: 12px;
            font-weight: 600; font-size: 0.95rem; cursor: pointer;
            border: 1px solid transparent; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s var(--ease);
        }

        .btn-add { background: #222; color: #fff; }
        .btn-add:hover { background: #333; }
        
        .btn-forge { background: var(--brand-accent); color: #fff; border: 1px solid rgba(0,0,0,0.2); }
        .btn-forge:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-forge:disabled { background: #222; color: var(--text-muted); cursor: not-allowed; border-color: var(--border); }

        .btn-reset { background: transparent; color: var(--text-muted); font-weight: 400; border: none; font-size: 0.85rem;}
        .btn-reset:hover { color: #ef4444; }

        /* The Foundry (Sorting Grid) */
        .foundry {
            flex: 1; min-height: 70vh; background: var(--bg-panel);
            border: 1px solid var(--border); border-radius: 16px; padding: 24px;
        }

        #sortable-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }

        @media (max-width: 600px) {
            #sortable-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .foundry { padding: 12px; }
            .controls-panel { border-radius: 0; margin: -20px; margin-bottom: 20px;}
        }

        /* Thumbnail styling - Essential for Dragging */
        .forge-item {
            position: relative; aspect-ratio: 1; border-radius: 12px;
            overflow: hidden; background: #000;
            border: 2px solid transparent;
            cursor: grab; transition: border-color 0.2s, transform 0.2s var(--ease);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* State: Active dragging */
        .sortable-ghost { opacity: 0.3; transform: scale(0.9); }
        .sortable-chosen { border-color: var(--brand-accent); cursor: grabbing; z-index: 10; }

        .forge-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .item-number {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            color: #fff; font-size: 0.7rem; font-weight: 700;
            width: 24px; height: 24px; display: flex; align-items: center;
            justify-content: center; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #file-input { display: none; }
        
        /* Empty State */
        .empty-context {
            grid-column: 1 / -1; text-align: center; color: var(--text-muted);
            font-weight: 300; font-size: 0.9rem; padding: 100px 0;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>Page Forge <span>Document Foundry</span></h1>
    <div style="font-size: 0.8rem; color:var(--text-muted)">Elite Edition v1.0</div>
</header>

<div class="viewport">
    
    <aside class="controls-panel">
        <div style="margin-bottom: auto">
            <h2 style="font-weight: 600; font-size: 1.1rem; margin: 0 0 8px 0;">Asset Pipeline</h2>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin: 0 0 20px 0;">
                Drag thumbnails within the foundry to set the generation order.
            </p>
        </div>

        <label for="file-input" class="action-btn btn-add">
            <i>+</i> Add Assets
            <input type="file" id="file-input" multiple accept="image/*" onchange="handleNewAssets(this.files)">
        </label>
        
        <button class="action-btn btn-forge" id="forge-trigger" onclick="generatePremiumPDF()" disabled>
            Forge Document (PDF)
        </button>
        
        <button class="action-btn btn-reset" onclick="extinguishForge()">
            Reset Foundry
        </button>
    </aside>

    <main class="foundry">
        <div id="sortable-grid">
            <div class="empty-context">
                <span style="font-size: 2rem; color: #333;">▧</span>
                Foundry inactive. <br> Add images to begin the process.
            </div>
        </div>
    </main>

</div>

<script>
    let forgeVault = []; // Stores the actual base64 data
    let sortableInstance;

    // Initialize Sortable Library
    document.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('sortable-grid');
        sortableInstance = new Sortable(grid, {
            animation: 300, 
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            onEnd: updateOrderNumbers // Trigger whenever drag ends
        });
    });

    async function handleNewAssets(files) {
        const grid = document.getElementById('sortable-grid');
        const emptyState = document.querySelector('.empty-context');
        if (emptyState) emptyState.remove();

        for (let file of files) {
            const dataUrl = await fileToBase64(file);
            forgeVault.push(dataUrl); // Keep vault synced
            
            const item = document.createElement('div');
            item.className = 'forge-item';
            item.innerHTML = `
                <img src="${dataUrl}">
                <div class="item-number">${forgeVault.length}</div>
            `;
            grid.appendChild(item);
        }
        syncVaultAndEnableForge();
    }

    function fileToBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }

    // Crucial: Update numbers and re-sync the array based on DOM order
    function updateOrderNumbers() {
        const gridItems = document.querySelectorAll('.forge-item');
        const numbers = document.querySelectorAll('.item-number');
        const newVault = [];

        gridItems.forEach((item, index) => {
            const imgBase64 = item.querySelector('img').src;
            newVault.push(imgBase64);
            numbers[index].innerText = index + 1;
        });

        forgeVault = newVault; // Order is now locked
    }

    function syncVaultAndEnableForge() {
        const btn = document.getElementById('forge-trigger');
        btn.disabled = forgeVault.length === 0;
        if (!btn.disabled) {
            btn.innerText = `Forge Document (${forgeVault.length})`;
        }
    }

    async function generatePremiumPDF() {
        if (forgeVault.length === 0) return;
        
        const btn = document.getElementById('forge-trigger');
        btn.innerText = "Processing...";
        btn.disabled = true;
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'a4'); // 'pt' for precise corporate layouts
        const pdfW = doc.internal.pageSize.getWidth();
        const pdfH = doc.internal.pageSize.getHeight();

        for (let i = 0; i < forgeVault.length; i++) {
            if (i > 0) doc.addPage();
            // Maintaining original aspect ratios while fitting to page
            doc.addImage(forgeVault[i], 'JPEG', 50, 50, pdfW - 100, pdfH - 100, undefined, 'FAST');
        }

        doc.save(`PageForge_ELITE_${Date.now()}.pdf`);
        btn.innerText = `Forge Document (${forgeVault.length})`;
        btn.disabled = false;
    }

    function extinguishForge() {
        location.reload();
    }
</script>

</body>
</html>
