<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Image to PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { margin-bottom: 20px; }
        button { background: #24292e; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #444; }
        #status { margin-top: 15px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Image to PDF Converter</h2>
    <p>Select images to merge into a single PDF.</p>
    <input type="file" id="imageInput" accept="image/*" multiple>
    <br>
    <button onclick="generatePDF()">Download PDF</button>
    <div id="status"></div>
</div>

<script>
    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const input = document.getElementById('imageInput');
        const status = document.getElementById('status');
        
        if (input.files.length === 0) {
            alert("Please select at least one image.");
            return;
        }

        status.innerText = "Processing...";
        const doc = new jsPDF();

        for (let i = 0; i < input.files.length; i++) {
            const file = input.files[i];
            const imageData = await readFileAsDataURL(file);
            
            // Add a new page for every image except the first one
            if (i > 0) doc.addPage();
            
            // Basic logic to fit image to page (A4 size roughly 210x297mm)
            doc.addImage(imageData, 'JPEG', 10, 10, 190, 0); 
        }

        doc.save("converted.pdf");
        status.innerText = "Done!";
    }

    function readFileAsDataURL(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsDataURL(file);
        });
    }
</script>

</body>
</html>
